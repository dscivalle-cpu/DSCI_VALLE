name: Deploy Edge Function a Supabase

# Se ejecuta automaticamente cada vez que se sube un cambio a la carpeta
# supabase/functions en la rama principal.
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch: {}  # tambien permite ejecutarlo manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Desplegar funcion kobo-webhook
        run: supabase functions deploy kobo-webhook --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
